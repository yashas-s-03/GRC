<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>TrustLens</title>
    <script>
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.host + l.pathname.split('/').slice(0, 1).join('/') +
        '/?/' + l.pathname.slice(1) + l.search + l.hash
      );
    </script>
  </head>
  <body></body>
</html>
